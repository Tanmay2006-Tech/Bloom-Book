kind = "web"
previewPath = "/"
title = "BloomBook"
version = "1.0.0"
id = "artifacts/bloombook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21579

[services.development]
run = "pnpm --filter @workspace/bloombook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloombook", "run", "build" ]
publicDir = "artifacts/bloombook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21579"
BASE_PATH = "/"
