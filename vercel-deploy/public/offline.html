<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#FFF8F0" />
    <title>BloomBook — Offline</title>
    <style>
      body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);box-sizing:border-box;background:#fff8f0;color:#2d1f1a;font:16px system-ui;text-align:center}
      main{max-width:340px;padding:32px;border-radius:24px;background:#fffdf9;box-shadow:0 8px 32px #e8a0b026}h1{font-family:Georgia,serif}p{color:#80645c;line-height:1.5}button{min-height:44px;border:0;border-radius:999px;padding:0 20px;background:#e8a0b0;color:white;font-weight:700}
    </style>
  </head>
  <body><main><div aria-hidden="true">🌷</div><h1>Your journal is resting offline</h1><p>Reconnect, then try again. Memories already on this device remain safe.</p><button onclick="location.reload()">Try again</button></main></body>
</html>
