openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BloomBook API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: memories
  - name: cafes
  - name: books
  - name: movies
  - name: wishlist
  - name: capsules
  - name: kitchen
  - name: reviews
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Dashboard counts
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /timeline:
    get:
      operationId: getTimeline
      tags: [stats]
      summary: Recent activity timeline
      responses:
        "200":
          description: Timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineItem"

  # ── MEMORIES ───────────────────────────────────────────────────────────
  /memories:
    get:
      operationId: listMemories
      tags: [memories]
      parameters:
        - in: query
          name: favorite
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  /memories/{id}:
    get:
      operationId: getMemory
      tags: [memories]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
    patch:
      operationId: updateMemory
      tags: [memories]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
    delete:
      operationId: deleteMemory
      tags: [memories]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  /memories/{id}/favorite:
    patch:
      operationId: toggleMemoryFavorite
      tags: [memories]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  # ── CAFES ──────────────────────────────────────────────────────────────
  /cafes:
    get:
      operationId: listCafes
      tags: [cafes]
      responses:
        "200":
          description: Cafes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cafe"
    post:
      operationId: createCafe
      tags: [cafes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CafeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cafe"

  /cafes/{id}:
    get:
      operationId: getCafe
      tags: [cafes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cafe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cafe"
    patch:
      operationId: updateCafe
      tags: [cafes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CafeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cafe"
    delete:
      operationId: deleteCafe
      tags: [cafes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ── BOOKS ──────────────────────────────────────────────────────────────
  /books:
    get:
      operationId: listBooks
      tags: [books]
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: Books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    patch:
      operationId: updateBook
      tags: [books]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    delete:
      operationId: deleteBook
      tags: [books]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ── MOVIES ─────────────────────────────────────────────────────────────
  /movies:
    get:
      operationId: listMovies
      tags: [movies]
      responses:
        "200":
          description: Movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
    post:
      operationId: createMovie
      tags: [movies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /movies/{id}:
    get:
      operationId: getMovie
      tags: [movies]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
    patch:
      operationId: updateMovie
      tags: [movies]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
    delete:
      operationId: deleteMovie
      tags: [movies]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ── WISHLIST ───────────────────────────────────────────────────────────
  /wishlist:
    get:
      operationId: listWishlist
      tags: [wishlist]
      responses:
        "200":
          description: Wishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wish"
    post:
      operationId: createWish
      tags: [wishlist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wish"

  /wishlist/{id}:
    patch:
      operationId: updateWish
      tags: [wishlist]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wish"
    delete:
      operationId: deleteWish
      tags: [wishlist]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  /wishlist/{id}/toggle:
    patch:
      operationId: toggleWishDone
      tags: [wishlist]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wish"

  # ── CAPSULES ───────────────────────────────────────────────────────────
  /capsules:
    get:
      operationId: listCapsules
      tags: [capsules]
      responses:
        "200":
          description: Capsules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Capsule"
    post:
      operationId: createCapsule
      tags: [capsules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapsuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"

  /capsules/{id}:
    get:
      operationId: getCapsule
      tags: [capsules]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Capsule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"
    delete:
      operationId: deleteCapsule
      tags: [capsules]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  /capsules/{id}/unlock:
    patch:
      operationId: unlockCapsule
      tags: [capsules]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"

  # ── KITCHEN ────────────────────────────────────────────────────────────
  /kitchen:
    get:
      operationId: listKitchenEntries
      tags: [kitchen]
      parameters:
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: Kitchen entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitchenEntry"
    post:
      operationId: createKitchenEntry
      tags: [kitchen]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KitchenEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitchenEntry"

  /kitchen/{id}:
    get:
      operationId: getKitchenEntry
      tags: [kitchen]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Kitchen entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitchenEntry"
    patch:
      operationId: updateKitchenEntry
      tags: [kitchen]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KitchenEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitchenEntry"
    delete:
      operationId: deleteKitchenEntry
      tags: [kitchen]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  # ── REVIEWS ────────────────────────────────────────────────────────────
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    get:
      operationId: getReview
      tags: [reviews]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    patch:
      operationId: updateReview
      tags: [reviews]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    delete:
      operationId: deleteReview
      tags: [reviews]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Stats:
      type: object
      required: [memories, cafes, books, movies, kitchen, reviews, wishes]
      properties:
        memories:
          type: integer
        cafes:
          type: integer
        books:
          type: integer
        movies:
          type: integer
        kitchen:
          type: integer
        reviews:
          type: integer
        wishes:
          type: integer

    TimelineItem:
      type: object
      required: [id, section, title, createdAt]
      properties:
        id:
          type: string
        section:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        createdAt:
          type: string

    # ── Memory ────────────────────────────────────────────────────────────
    Memory:
      type: object
      required: [id, title, isFavorite, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        mediaUrl:
          type: ["string", "null"]
        mediaType:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        isFavorite:
          type: ["boolean", "null"]
        createdAt:
          type: string

    MemoryInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        mediaUrl:
          type: string
        mediaType:
          type: string
        date:
          type: string
        isFavorite:
          type: ["boolean", "null"]

    MemoryUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        mediaUrl:
          type: string
        mediaType:
          type: string
        date:
          type: string
        isFavorite:
          type: ["boolean", "null"]

    # ── Cafe ──────────────────────────────────────────────────────────────
    Cafe:
      type: object
      required: [id, name, wouldVisitAgain, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
        whatWeAte:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        wouldVisitAgain:
          type: ["boolean", "null"]
        createdAt:
          type: string

    CafeInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        location:
          type: string
        date:
          type: string
        rating:
          type: integer
        whatWeAte:
          type: string
        photoUrl:
          type: string
        reflection:
          type: string
        wouldVisitAgain:
          type: ["boolean", "null"]

    CafeUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        location:
          type: string
        date:
          type: string
        rating:
          type: integer
        whatWeAte:
          type: string
        photoUrl:
          type: string
        reflection:
          type: string
        wouldVisitAgain:
          type: ["boolean", "null"]

    # ── Book ──────────────────────────────────────────────────────────────
    Book:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
        quote:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        isStayed:
          type: ["boolean", "null"]
        createdAt:
          type: string

    BookInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        author:
          type: string
        status:
          type: string
        rating:
          type: integer
        quote:
          type: string
        reflection:
          type: string
        coverUrl:
          type: string
        isStayed:
          type: ["boolean", "null"]

    BookUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        author:
          type: string
        status:
          type: string
        rating:
          type: integer
        quote:
          type: string
        reflection:
          type: string
        coverUrl:
          type: string
        isStayed:
          type: ["boolean", "null"]

    # ── Movie ─────────────────────────────────────────────────────────────
    Movie:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
        whatItReminded:
          type: ["string", "null"]
        posterUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    MovieInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        genre:
          type: string
        rating:
          type: integer
        whatItReminded:
          type: string
        posterUrl:
          type: string

    MovieUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        genre:
          type: string
        rating:
          type: integer
        whatItReminded:
          type: string
        posterUrl:
          type: string

    # ── Wish ──────────────────────────────────────────────────────────────
    Wish:
      type: object
      required: [id, title, isDone, createdAt]
      properties:
        id:
          type: string
        emoji:
          type: ["string", "null"]
        title:
          type: string
        notes:
          type: ["string", "null"]
        isDone:
          type: ["boolean", "null"]
        createdAt:
          type: string

    WishInput:
      type: object
      required: [title]
      properties:
        emoji:
          type: string
        title:
          type: string
          minLength: 1
        notes:
          type: string
        isDone:
          type: ["boolean", "null"]

    WishUpdate:
      type: object
      properties:
        emoji:
          type: string
        title:
          type: string
          minLength: 1
        notes:
          type: string
        isDone:
          type: ["boolean", "null"]

    # ── Capsule ───────────────────────────────────────────────────────────
    Capsule:
      type: object
      required: [id, title, message, unlockAt, isUnlocked, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        unlockAt:
          type: string
        isUnlocked:
          type: ["boolean", "null"]
        createdAt:
          type: string

    CapsuleInput:
      type: object
      required: [title, message, unlockAt]
      properties:
        title:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        unlockAt:
          type: string

    # ── KitchenEntry ──────────────────────────────────────────────────────
    KitchenEntry:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: ["string", "null"]
        recipe:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
        mood:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        wouldMakeAgain:
          type: ["boolean", "null"]
        date:
          type: ["string", "null"]
        createdAt:
          type: string

    KitchenEntryInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        recipe:
          type: string
        photoUrl:
          type: string
        rating:
          type: integer
        mood:
          type: string
        notes:
          type: string
        wouldMakeAgain:
          type: ["boolean", "null"]
        date:
          type: string

    KitchenEntryUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        recipe:
          type: string
        photoUrl:
          type: string
        rating:
          type: integer
        mood:
          type: string
        notes:
          type: string
        wouldMakeAgain:
          type: ["boolean", "null"]
        date:
          type: string

    # ── Review ────────────────────────────────────────────────────────────
    Review:
      type: object
      required: [id, subject, review, createdAt]
      properties:
        id:
          type: string
        subject:
          type: string
        category:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
        vibeCheck:
